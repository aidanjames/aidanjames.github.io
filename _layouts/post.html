---
layout: default
---
<article>
  <div class="category">{{ page.categories | first }}</div>
  <h1>{{ page.title }}</h1>
  <div class="meta">
    <span>By {{ page.author | default: site.author }}</span>
    <span>{{ page.date | date: '%B %d, %Y' }}</span>
    {% if page.read_time %}
    <span>{{ page.read_time }} min read</span>
    {% endif %}
  </div>
</article>

<div class="post-content">
  {{ content }}
</div>
